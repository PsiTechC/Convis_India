name: Deploy to AWS

# When this runs:
#   - push to main → full deploy (api + web to ap-south-1, agent stays in us-east-1 for now)
#   - workflow_dispatch → manual run from Actions tab (useful for first deploy / forced rebuild)
#
# What this does:
#   1. Builds Docker images for convis-api and convis-web on amd64
#   2. Pushes convis-api to BOTH ap-south-1 ECR (for the new ECS Express Mode api service)
#      AND us-east-1 ECR (so the still-running us-east-1 agent task keeps getting new images).
#      Once the agent is migrated to ap-south-1, the us-east-1 push step can be removed.
#   3. Pushes convis-web to ap-south-1 ECR only.
#   4. Forces ECS Express Mode services (convis-api, convis-web in `default` cluster, ap-south-1)
#      to pull the new :latest.
#   5. Forces the us-east-1 agent service (cluster `convis`) to pull the new :latest.
#
# Auth: federated OIDC, no long-lived AWS keys stored in GitHub. The IAM role
# `GitHubActionsConvisDeployRole` is restricted to this repo.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# OIDC requires id-token: write permission. contents: read is the default.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}              # ap-south-1 — primary region for api/web
  AWS_AGENT_REGION: us-east-1                     # TEMP: agent still lives here until Part 8 migration
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REGISTRY_PRIMARY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
  ECR_REGISTRY_LEGACY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Detect which directories changed. Skip image builds when only docs
  # or unrelated paths change — saves CI minutes and ECR storage.
  # ─────────────────────────────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # On the first run (workflow_dispatch with no base ref), build everything.
          base: ${{ github.event.before || '' }}
          filters: |
            api:
              - 'convis-api/**'
              - '.github/workflows/deploy.yml'
            web:
              - 'convis-web/**'
              - '.github/workflows/deploy.yml'

  # ─────────────────────────────────────────────────────────────────────
  # Build + push convis-api image. This SAME image is used by both
  # the ap-south-1 ECS Express Mode api service AND the us-east-1
  # ECS Fargate agent worker (with a CMD override in the agent task def).
  # We push to BOTH regions' ECR until the agent migrates to ap-south-1.
  # ─────────────────────────────────────────────────────────────────────
  build-api:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsConvisDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ap-south-1 ECR (primary)
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY_PRIMARY }}

      # TEMPORARY: also push to us-east-1 ECR so the still-running us-east-1
      # convis-livekit-agent keeps receiving new convis-api images. Remove
      # this step (and the us-east-1 push tags below) after the agent is
      # migrated to ap-south-1 (Part 8 of deployment-docs/aws/AWS_ECS_EXPRESS_MODE.md).
      - name: Login to us-east-1 ECR (legacy, for agent)
        run: |
          aws ecr get-login-password --region ${{ env.AWS_AGENT_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY_LEGACY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The convis-api Dockerfile installs PyTorch CPU-only (~200MB) which is
      # slow. Buildx layer caching across runs cuts subsequent builds from
      # ~8 min to ~2 min on the same Dockerfile + requirements.txt.
      - name: Build and push convis-api image (ap-south-1 + us-east-1)
        uses: docker/build-push-action@v5
        with:
          context: ./convis-api
          file: ./convis-api/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.ECR_REGISTRY_PRIMARY }}/convis-api:latest
            ${{ env.ECR_REGISTRY_PRIMARY }}/convis-api:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY_LEGACY }}/convis-api:latest
            ${{ env.ECR_REGISTRY_LEGACY }}/convis-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Defensive — `docker buildx --push` can silently fail to write the manifest.
      # Without this check, ECS will then crash-loop on CannotPullContainerError.
      - name: Verify image landed in ap-south-1 ECR
        run: |
          aws ecr describe-images \
            --repository-name convis-api \
            --image-ids imageTag=${{ env.IMAGE_TAG }} \
            --region ${{ env.AWS_REGION }} \
            --query 'imageDetails[0].imageTags' || (echo "Image NOT pushed to ap-south-1 ECR — aborting" && exit 1)

      - name: Verify image landed in us-east-1 ECR
        run: |
          aws ecr describe-images \
            --repository-name convis-api \
            --image-ids imageTag=${{ env.IMAGE_TAG }} \
            --region ${{ env.AWS_AGENT_REGION }} \
            --query 'imageDetails[0].imageTags' || (echo "Image NOT pushed to us-east-1 ECR — aborting" && exit 1)

  # ─────────────────────────────────────────────────────────────────────
  # Build + push convis-web image to ap-south-1 ECR only (no us-east-1
  # web service exists). NEXT_PUBLIC_* env vars are baked into the
  # Next.js bundle at build time via --build-arg — the Dockerfile must
  # declare matching `ARG NEXT_PUBLIC_API_URL` lines for this to take
  # effect (see convis-web/Dockerfile).
  # ─────────────────────────────────────────────────────────────────────
  build-web:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsConvisDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ap-south-1 ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY_PRIMARY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push convis-web image
        uses: docker/build-push-action@v5
        with:
          context: ./convis-web
          file: ./convis-web/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.ECR_REGISTRY_PRIMARY }}/convis-web:latest
            ${{ env.ECR_REGISTRY_PRIMARY }}/convis-web:${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image landed in ECR
        run: |
          aws ecr describe-images \
            --repository-name convis-web \
            --image-ids imageTag=${{ env.IMAGE_TAG }} \
            --region ${{ env.AWS_REGION }} \
            --query 'imageDetails[0].imageTags' || (echo "Image NOT pushed to ECR — aborting" && exit 1)

  # ─────────────────────────────────────────────────────────────────────
  # Force ECS Express Mode convis-api (ap-south-1, cluster `default`) to
  # pull the new :latest tag. Express Mode uses standard ECS underneath,
  # so `update-service --force-new-deployment` works the same way.
  # ─────────────────────────────────────────────────────────────────────
  deploy-api:
    needs: build-api
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsConvisDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Force-redeploy convis-api on ECS Express Mode (ap-south-1)
        run: |
          aws ecs update-service \
            --cluster default \
            --service convis-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} \
            --output table \
            --query 'service.{name:serviceName,desired:desiredCount,running:runningCount,status:status}'

  # ─────────────────────────────────────────────────────────────────────
  # Force ECS Express Mode convis-web (ap-south-1, cluster `default`) to
  # pull the new :latest tag.
  # ─────────────────────────────────────────────────────────────────────
  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsConvisDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Force-redeploy convis-web on ECS Express Mode (ap-south-1)
        run: |
          aws ecs update-service \
            --cluster default \
            --service convis-web \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} \
            --output table \
            --query 'service.{name:serviceName,desired:desiredCount,running:runningCount,status:status}'

  # ─────────────────────────────────────────────────────────────────────
  # Force ECS Fargate to pull the new convis-api:latest and replace the
  # agent worker task. --force-new-deployment doesn't need a new task def
  # since the task def references :latest.
  #
  # TEMPORARY: agent is still in us-east-1 cluster `convis`. After Part 8
  # (agent migration to ap-south-1), change cluster: `default` and remove
  # the explicit --region (let it inherit AWS_REGION = ap-south-1).
  # ─────────────────────────────────────────────────────────────────────
  deploy-agent:
    needs: build-api    # agent uses the convis-api image
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsConvisDeployRole
          aws-region: ${{ env.AWS_AGENT_REGION }}

      - name: Force-redeploy convis-livekit-agent (us-east-1, pre-migration)
        run: |
          aws ecs update-service \
            --cluster convis \
            --service convis-livekit-agent \
            --force-new-deployment \
            --region ${{ env.AWS_AGENT_REGION }} \
            --output table \
            --query 'service.{name:serviceName,desired:desiredCount,running:runningCount,status:status}'
